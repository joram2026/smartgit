<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email — Smart Lishe</title>
  <link rel="stylesheet" href="auth.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script type="module" src="/firebase-auth-helper.js"></script>
</head>
<body>

<div class="auth-container">
  <div class="auth-card">
    <!-- Brand -->
    <div class="auth-brand">
      <div class="brand-icon"><i class="fa-solid fa-seedling"></i></div>
      <h1>Email Sent</h1>
      <p>Check your inbox</p>
    </div>

    <div class="auth-success">
      <div class="success-icon"><i class="fa-regular fa-envelope"></i></div>
      <h3>Email Sent Successfully</h3>
      <p>A password reset link has been sent to your email address. Please check your inbox and follow the instructions.</p>

      <div style="display:flex;flex-direction:column;gap:10px;margin-top:16px;">
        <button class="btn btn-primary" id="continueBtn">
          <i class="fa-regular fa-arrow-right"></i> Continue
        </button>
        <button class="btn btn-secondary" id="resendBtn">
          <i class="fa-regular fa-rotate"></i> Resend Email
        </button>
      </div>
    </div>

    <div class="auth-links">
      <p><a href="login.html">Back to Login</a></p>
    </div>
  </div>
</div>

<script>
/* ============================================================
   SMART LISHE — VERIFY EMAIL
   ============================================================ */

function showToast(msg, type = 'success') {
  const old = document.querySelector('.toast');
  if(old) old.remove();
  const t = document.createElement('div');
  t.className = 'toast' + (type === 'error' ? ' error' : '');
  const icon = type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check';
  t.innerHTML = `<i class="fa-solid ${icon}"></i><span>${msg}</span>`;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(40px)'; setTimeout(() => t.remove(), 350); }, 3500);
}

document.getElementById('continueBtn').addEventListener('click', function() {
  window.location.href = 'reset-password.html';
});

document.getElementById('resendBtn').addEventListener('click', function() {
  this.disabled = true;
  this.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';
  setTimeout(() => {
    showToast('Reset link resent!');
    this.disabled = false;
    this.innerHTML = '<i class="fa-regular fa-rotate"></i> Resend Email';
  }, 1200);
});
</script>
</body>
</html>
