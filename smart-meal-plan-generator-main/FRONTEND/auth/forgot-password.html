<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Smart Lishe</title>
  <link rel="stylesheet" href="auth.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="auth-container">
  <div class="auth-card">
    <!-- Brand -->
    <div class="auth-brand">
      <div class="brand-icon"><i class="fa-solid fa-seedling"></i></div>
      <h1>Forgot Password</h1>
      <p>Recover access to your account.</p>
    </div>

    <!-- Back to Login -->
    <a href="login.html" class="back-home" style="display:inline-flex;align-items:center;gap:8px;margin-bottom:20px;">
      <i class="fa-solid fa-arrow-left"></i> Back To Login
    </a>

    <!-- Form -->
    <form id="forgotForm" class="auth-form" novalidate>
      <div class="field-group">
        <label for="forgotEmail">Email Address</label>
        <input type="email" id="forgotEmail" placeholder="you@example.com" autocomplete="email" required>
      </div>

      <button type="submit" class="btn btn-primary" id="forgotBtn">
        <i class="fa-regular fa-paper-plane"></i> Send Reset Link
      </button>
    </form>

    <div class="auth-links">
      <p>Remember your password? <a href="login.html">Login</a></p>
    </div>
  </div>
</div>

<script>
/* ============================================================
   SMART LISHE — FORGOT PASSWORD
   ============================================================ */

function showToast(msg, type = 'success') {
  const old = document.querySelector('.toast');
  if(old) old.remove();
  const t = document.createElement('div');
  t.className = 'toast' + (type === 'error' ? ' error' : '');
  const icon = type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check';
  t.innerHTML = `<i class="fa-solid ${icon}"></i><span>${msg}</span>`;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(40px)'; setTimeout(() => t.remove(), 350); }, 3500);
}

document.getElementById('forgotForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const email = document.getElementById('forgotEmail').value.trim();

  if(!email || !email.includes('@')) {
    showToast('Please enter a valid email address.', 'error');
    return;
  }

  const btn = document.getElementById('forgotBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';

  setTimeout(() => {
    showToast('Reset link sent! Check your email.');
    setTimeout(() => {
      window.location.href = 'verify-email.html';
    }, 800);
  }, 1200);
});
</script>
</body>
</html>
