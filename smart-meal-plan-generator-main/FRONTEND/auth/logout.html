<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logout — Smart Lishe</title>
  <link rel="stylesheet" href="auth.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="auth-container">
  <div class="auth-card" style="text-align:center;padding:50px 44px;">
    <div class="auth-brand">
      <div class="brand-icon"><i class="fa-solid fa-seedling"></i></div>
      <h1>Logging Out</h1>
      <p>See you soon!</p>
    </div>

    <div style="margin:30px 0 20px;">
      <div style="width:60px;height:60px;border-radius:50%;border:4px solid var(--basket-line);border-top-color:var(--sukuma);animation:spin 1s linear infinite;margin:0 auto;"></div>
      <p style="color:var(--text-secondary);margin-top:16px;">Clearing your session...</p>
    </div>

    <div class="auth-links">
      <p><a href="login.html">Return to Login</a></p>
    </div>
  </div>
</div>

<style>
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>

<script>
/* ============================================================
   SMART LISHE — LOGOUT
   ============================================================ */

// Clear all session data
localStorage.clear();

// Redirect after short delay
setTimeout(function() {
  window.location.href = 'login.html';
}, 1500);
</script>
</body>
</html>
