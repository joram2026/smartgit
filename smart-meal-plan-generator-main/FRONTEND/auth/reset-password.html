<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Smart Lishe</title>
  <link rel="stylesheet" href="auth.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="auth-container">
  <div class="auth-card">
    <!-- Brand -->
    <div class="auth-brand">
      <div class="brand-icon"><i class="fa-solid fa-seedling"></i></div>
      <h1>Reset Password</h1>
      <p>Create a new password for your account.</p>
    </div>

    <!-- Back to Login -->
    <a href="login.html" class="back-home" style="display:inline-flex;align-items:center;gap:8px;margin-bottom:20px;">
      <i class="fa-solid fa-arrow-left"></i> Back To Login
    </a>

    <!-- Form -->
    <form id="resetForm" class="auth-form" novalidate>
      <div class="field-group">
        <label for="newPassword">New Password</label>
        <div class="pw-wrap">
          <input type="password" id="newPassword" placeholder="At least 8 characters" autocomplete="new-password" required minlength="8">
          <button type="button" class="pw-toggle" id="toggleNewPw" aria-label="Toggle password visibility">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
        <div class="pw-strength"><div class="pw-strength-fill" id="resetPwStrengthFill"></div></div>
        <div class="pw-strength-label" id="resetPwStrengthLabel"></div>
      </div>

      <div class="field-group">
        <label for="confirmNewPassword">Confirm Password</label>
        <div class="pw-wrap">
          <input type="password" id="confirmNewPassword" placeholder="Confirm your new password" autocomplete="new-password" required>
          <button type="button" class="pw-toggle" id="toggleConfirmNewPw" aria-label="Toggle password visibility">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" id="resetBtn">
        <i class="fa-regular fa-key"></i> Reset Password
      </button>
    </form>

    <!-- Success Message (hidden initially) -->
    <div class="auth-success" id="resetSuccess" style="display:none;">
      <div class="success-icon"><i class="fa-regular fa-circle-check"></i></div>
      <h3>Password Updated Successfully</h3>
      <p>Your password has been reset. You can now log in with your new credentials.</p>
      <button class="btn btn-primary" id="goToLoginBtn">
        <i class="fa-regular fa-right-to-bracket"></i> Go to Login
      </button>
    </div>

    <div class="auth-links" id="resetLinks">
      <p><a href="login.html">Back to Login</a></p>
    </div>
  </div>
</div>

<script>
/* ============================================================
   SMART LISHE — RESET PASSWORD
   ============================================================ */

// ---- Toggle Passwords ----
document.getElementById('toggleNewPw').addEventListener('click', function() {
  const input = document.getElementById('newPassword');
  const icon = this.querySelector('i');
  input.type = input.type === 'password' ? 'text' : 'password';
  icon.className = input.type === 'password' ? 'fa-regular fa-eye' : 'fa-regular fa-eye-slash';
});
document.getElementById('toggleConfirmNewPw').addEventListener('click', function() {
  const input = document.getElementById('confirmNewPassword');
  const icon = this.querySelector('i');
  input.type = input.type === 'password' ? 'text' : 'password';
  icon.className = input.type === 'password' ? 'fa-regular fa-eye' : 'fa-regular fa-eye-slash';
});

// ---- Password Strength ----
document.getElementById('newPassword').addEventListener('input', function() {
  const pw = this.value;
  const fill = document.getElementById('resetPwStrengthFill');
  const label = document.getElementById('resetPwStrengthLabel');
  let score = 0;
  if(pw.length >= 8) score++;
  if(/[A-Z]/.test(pw)) score++;
  if(/[0-9]/.test(pw)) score++;
  if(/[^A-Za-z0-9]/.test(pw)) score++;

  const levels = [
    { w:'0%', c:'transparent', t:'' },
    { w:'25%', c:'var(--char)', t:'Weak' },
    { w:'50%', c:'var(--maize-deep)', t:'Fair' },
    { w:'75%', c:'var(--sukuma-light)', t:'Good' },
    { w:'100%', c:'var(--sukuma)', t:'Strong' }
  ];
  const lv = levels[score] || levels[0];
  fill.style.width = lv.w;
  fill.style.background = lv.c;
  label.textContent = lv.t;
});

// ---- Toast ----
function showToast(msg, type = 'success') {
  const old = document.querySelector('.toast');
  if(old) old.remove();
  const t = document.createElement('div');
  t.className = 'toast' + (type === 'error' ? ' error' : '');
  const icon = type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check';
  t.innerHTML = `<i class="fa-solid ${icon}"></i><span>${msg}</span>`;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(40px)'; setTimeout(() => t.remove(), 350); }, 3500);
}

// ---- Form Submit ----
document.getElementById('resetForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const newPw = document.getElementById('newPassword').value;
  const confirmPw = document.getElementById('confirmNewPassword').value;

  if(newPw.length < 8) { showToast('Password must be at least 8 characters.', 'error'); return; }
  if(newPw !== confirmPw) { showToast('Passwords do not match.', 'error'); return; }

  const btn = document.getElementById('resetBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Resetting...';

  setTimeout(() => {
    // Hide form, show success
    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('resetLinks').style.display = 'none';
    document.getElementById('resetSuccess').style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-regular fa-key"></i> Reset Password';
  }, 1200);
});

document.getElementById('goToLoginBtn').addEventListener('click', function() {
  window.location.href = 'login.html';
});
</script>
</body>
</html>
